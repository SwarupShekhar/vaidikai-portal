<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaicore — Admin</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* Admin-specific styles */
        #login-view, #admin-view { display: none; }

        .admin-header {
            background-color: var(--card-bg);
            padding: 16px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(197,232,77,0.2);
        }
        .admin-header h1 { color: var(--accent-color); margin: 0; font-size: 1.4rem; }
        .admin-header span { color: var(--grey); font-size: 0.85rem; margin-left: 12px; }

        .stats-row {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 18px 28px;
            min-width: 140px;
            text-align: center;
        }
        .stat-card .num { font-size: 2rem; color: var(--accent-color); font-weight: bold; }
        .stat-card .label { font-size: 0.8rem; color: var(--grey); margin-top: 4px; }

        .add-form {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .add-form .field { display: flex; flex-direction: column; gap: 6px; }
        .add-form label { font-size: 0.8rem; color: var(--grey); font-weight: bold; }
        .add-form input[type="text"],
        .add-form input[type="email"] {
            padding: 10px 14px;
            border: 1px solid var(--grey);
            border-radius: 4px;
            background: var(--bg-color);
            color: var(--white);
            min-width: 200px;
        }

        /* Client table */
        .client-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .client-table th, .client-table td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            font-size: 0.9rem;
        }
        .client-table th { background: rgba(255,255,255,0.05); color: var(--grey); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; }
        .client-table tr:hover td { background: rgba(255,255,255,0.03); }

        .badge-active { background: rgba(81,207,102,0.15); color: #51cf66; padding: 3px 10px; border-radius: 50px; font-size: 0.78rem; font-weight: bold; }
        .badge-inactive { background: rgba(255,107,107,0.15); color: #ff6b6b; padding: 3px 10px; border-radius: 50px; font-size: 0.78rem; font-weight: bold; }

        .token-cell { font-family: monospace; font-size: 0.78rem; color: var(--grey); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .btn-icon {
            padding: 6px 12px;
            font-size: 0.78rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .btn-icon:hover { opacity: 0.8; }
        .btn-copy { background: rgba(197,232,77,0.15); color: var(--accent-color); }
        .btn-rotate { background: rgba(255,255,255,0.08); color: var(--white); }
        .btn-toggle-on { background: rgba(255,107,107,0.15); color: #ff6b6b; }
        .btn-toggle-off { background: rgba(81,207,102,0.15); color: #51cf66; }
        .btn-delete { background: rgba(255,107,107,0.08); color: #ff6b6b; }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--accent-color);
            color: var(--bg-color);
            padding: 12px 22px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 9999;
            pointer-events: none;
        }
        #toast.show { opacity: 1; }

        /* New row highlight */
        @keyframes highlight {
            0% { background: rgba(197,232,77,0.12); }
            100% { background: transparent; }
        }
        .new-row td { animation: highlight 2s ease-out; }

        #login-view {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 40px;
            max-width: 380px;
            width: 100%;
            text-align: center;
        }
        .login-card h2 { color: var(--accent-color); margin-bottom: 6px; }
        .login-card p { color: var(--grey); margin-bottom: 24px; font-size: 0.9rem; }
        .login-card input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--grey);
            border-radius: 4px;
            background: var(--bg-color);
            color: var(--white);
            font-size: 1rem;
            box-sizing: border-box;
            margin-bottom: 14px;
        }
        .login-card .btn { width: 100%; }
        .login-error { color: #ff6b6b; font-size: 0.85rem; margin-top: 8px; min-height: 20px; }

        .empty-state { text-align: center; color: var(--grey); padding: 40px; font-size: 0.9rem; }
    </style>
</head>
<body>

<!-- LOGIN VIEW -->
<div id="login-view">
    <div class="login-card">
        <h2>Vaicore</h2>
        <p>Admin &amp; Operations Center</p>
        <input type="password" id="admin-password" placeholder="Admin password" autofocus>
        <button class="btn" onclick="doLogin()">Sign In</button>
        <div class="login-error" id="login-error"></div>
    </div>
</div>

<!-- ADMIN VIEW -->
<div id="admin-view">
    <div class="admin-header">
        <div>
            <h1>Vaicore <span>Admin &amp; Operations Center</span></h1>
        </div>
        <button class="btn-icon btn-delete" onclick="doLogout()">Sign Out</button>
    </div>

    <div class="container" style="padding-top: 28px;">

        <!-- Stats -->
        <div class="stats-row" id="stats-row">
            <div class="stat-card"><div class="num" id="stat-total">—</div><div class="label">Total Clients</div></div>
            <div class="stat-card"><div class="num" id="stat-active">—</div><div class="label">Active</div></div>
            <div class="stat-card"><div class="num" id="stat-inactive">—</div><div class="label">Inactive</div></div>
        </div>

        <!-- Add Client -->
        <div class="card">
            <h2 style="margin-top:0">Add New Client</h2>
            <div class="add-form">
                <div class="field">
                    <label>Client Name *</label>
                    <input type="text" id="new-name" placeholder="e.g. HDFC Bank">
                </div>
                <div class="field">
                    <label>Contact Email</label>
                    <input type="email" id="new-email" placeholder="client@company.com">
                </div>
                <button class="btn" style="height:42px" onclick="addClient()">+ Add Client</button>
            </div>
            <div id="add-error" style="color:#ff6b6b;font-size:0.85rem;min-height:18px;margin-top:4px;"></div>
        </div>

        <!-- Client Table -->
        <div class="card">
            <h2 style="margin-top:0">All Clients</h2>
            <table class="client-table">
                <thead>
                    <tr>
                        <th>Client</th>
                        <th>Code</th>
                        <th>Email</th>
                        <th>Created</th>
                        <th>Status</th>
                        <th>Token</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="clients-tbody">
                    <tr><td colspan="7" class="empty-state">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
    // ── Auth ──────────────────────────────────────────────
    async function doLogin() {
        const pw = document.getElementById('admin-password').value;
        const err = document.getElementById('login-error');
        err.textContent = '';
        const res = await fetch('/admin/login', {
            method: 'POST',
            body: new URLSearchParams({ password: pw })
        });
        if (res.ok) {
            showAdmin();
        } else {
            err.textContent = 'Invalid password.';
        }
    }

    document.getElementById('admin-password').addEventListener('keydown', e => {
        if (e.key === 'Enter') doLogin();
    });

    async function doLogout() {
        await fetch('/admin/logout', { method: 'POST' });
        document.getElementById('admin-view').style.display = 'none';
        document.getElementById('login-view').style.display = 'flex';
        document.getElementById('admin-password').value = '';
    }

    // ── Boot ──────────────────────────────────────────────
    async function boot() {
        const res = await fetch('/api/admin/clients');
        if (res.ok) {
            showAdmin();
        } else {
            document.getElementById('login-view').style.display = 'flex';
        }
    }

    function showAdmin() {
        document.getElementById('login-view').style.display = 'none';
        document.getElementById('admin-view').style.display = 'block';
        loadClients();
    }

    // ── Load clients ──────────────────────────────────────
    let _clients = [];

    async function loadClients() {
        const res = await fetch('/api/admin/clients');
        if (!res.ok) return;
        _clients = await res.json();
        renderTable(_clients);
        renderStats(_clients);
    }

    function renderStats(clients) {
        const active = clients.filter(c => c.active).length;
        document.getElementById('stat-total').textContent = clients.length;
        document.getElementById('stat-active').textContent = active;
        document.getElementById('stat-inactive').textContent = clients.length - active;
    }

    function renderTable(clients, newToken = null) {
        const tbody = document.getElementById('clients-tbody');
        if (clients.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No clients yet. Add one above.</td></tr>';
            return;
        }
        tbody.innerHTML = '';
        clients.forEach(c => {
            const tr = document.createElement('tr');
            if (c.token === newToken) tr.className = 'new-row';

            const statusBadge = c.active
                ? `<span class="badge-active">Active</span>`
                : `<span class="badge-inactive">Inactive</span>`;

            const toggleLabel = c.active ? 'Revoke' : 'Activate';
            const toggleClass = c.active ? 'btn-toggle-on' : 'btn-toggle-off';

            tr.innerHTML = `
                <td><strong>${esc(c.client_name)}</strong></td>
                <td style="font-family:monospace;color:var(--accent-color)">${esc(c.client_code)}</td>
                <td style="color:var(--grey)">${esc(c.contact_email || '—')}</td>
                <td style="color:var(--grey)">${esc(c.created_at)}</td>
                <td>${statusBadge}</td>
                <td class="token-cell" title="${esc(c.token)}">${esc(c.token)}</td>
                <td class="actions">
                    <button class="btn-icon btn-copy" onclick="copyLink('${esc(c.token)}')">Copy Link</button>
                    <button class="btn-icon ${toggleClass}" onclick="toggleClient('${esc(c.token)}')">${toggleLabel}</button>
                    <button class="btn-icon btn-rotate" onclick="rotateToken('${esc(c.token)}', '${esc(c.client_name)}')">Rotate</button>
                    <button class="btn-icon btn-delete" onclick="deleteClient('${esc(c.token)}', '${esc(c.client_name)}')">Delete</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // ── Add client ────────────────────────────────────────
    async function addClient() {
        const name = document.getElementById('new-name').value.trim();
        const email = document.getElementById('new-email').value.trim();
        const errDiv = document.getElementById('add-error');
        errDiv.textContent = '';

        if (!name) { errDiv.textContent = 'Client name is required.'; return; }

        const body = new URLSearchParams({ client_name: name, contact_email: email });
        const res = await fetch('/api/admin/clients', { method: 'POST', body });

        if (res.ok) {
            const c = await res.json();
            document.getElementById('new-name').value = '';
            document.getElementById('new-email').value = '';
            _clients.unshift(c);
            renderTable(_clients, c.token);
            renderStats(_clients);
            toast(`Client "${c.client_name}" added — ${c.client_code}`);
            copyLink(c.token, false);
        } else {
            errDiv.textContent = 'Failed to add client.';
        }
    }

    // ── Toggle ────────────────────────────────────────────
    async function toggleClient(token) {
        const res = await fetch(`/api/admin/clients/${token}/toggle`, { method: 'PATCH' });
        if (res.ok) {
            const { active } = await res.json();
            const c = _clients.find(x => x.token === token);
            if (c) c.active = active;
            renderTable(_clients);
            renderStats(_clients);
            toast(active ? 'Client activated.' : 'Client revoked.');
        }
    }

    // ── Rotate token ──────────────────────────────────────
    async function rotateToken(token, name) {
        if (!confirm(`Rotate token for "${name}"?\n\nThe old access link will stop working immediately.`)) return;
        const res = await fetch(`/api/admin/clients/${token}/rotate`, { method: 'POST' });
        if (res.ok) {
            const { token: newToken } = await res.json();
            const idx = _clients.findIndex(x => x.token === token);
            if (idx !== -1) _clients[idx].token = newToken;
            renderTable(_clients, newToken);
            copyLink(newToken, false);
            toast(`Token rotated — new link copied to clipboard.`);
        }
    }

    // ── Delete ────────────────────────────────────────────
    async function deleteClient(token, name) {
        if (!confirm(`Permanently delete "${name}"?\n\nThis cannot be undone.`)) return;
        const res = await fetch(`/api/admin/clients/${token}`, { method: 'DELETE' });
        if (res.ok) {
            _clients = _clients.filter(x => x.token !== token);
            renderTable(_clients);
            renderStats(_clients);
            toast(`"${name}" deleted.`);
        }
    }

    // ── Copy link ─────────────────────────────────────────
    function copyLink(token, showToast = true) {
        const url = `${location.origin}/access/${token}`;
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(url).then(() => {
                if (showToast) toast('Access link copied to clipboard.');
            }).catch(() => _fallbackCopy(url, showToast));
        } else {
            _fallbackCopy(url, showToast);
        }
    }

    function _fallbackCopy(text, showToast) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        try {
            document.execCommand('copy');
            if (showToast) toast('Access link copied to clipboard.');
        } catch {
            prompt('Copy this link:', text);
        }
        document.body.removeChild(ta);
    }

    // ── Utilities ─────────────────────────────────────────
    function esc(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    let _toastTimer;
    function toast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        clearTimeout(_toastTimer);
        _toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
    }

    boot();
</script>
</body>
</html>
