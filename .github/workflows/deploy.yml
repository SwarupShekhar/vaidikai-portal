name: Deploy to Vultr

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VULTR_SSH_PRIVATE_KEY }}" > ~/.ssh/vultr
          chmod 600 ~/.ssh/vultr
          ssh-keyscan -H ${{ secrets.VULTR_IP }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/vultr -o StrictHostKeyChecking=no deploy@${{ secrets.VULTR_IP }} << 'EOF'
            set -e

            REPO_URL="https://github.com/SwarupShekhar/VAICORE.git"
            DEPLOY_DIR="/opt/vaidikai-portal/vaidikai-portal"

            # ── Clone on first run, pull on subsequent runs ──────────────
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              echo "📥 First deploy — cloning repository..."
              git clone "$REPO_URL" "$DEPLOY_DIR"
            else
              echo "📦 Pulling latest code..."
              cd "$DEPLOY_DIR"
              # Only remove specific known transient files that block merge — NEVER wipe the entire directory
              git rm -r --cached labelstudio-data/ 2>/dev/null || true
              # Remove only the specific tracked files that git reports as conflicts (NOT the whole directory)
              git status --short | grep '^?' | awk '{print $2}' | grep '^labelstudio-data/' | xargs -r rm -f || true
              git pull origin main
            fi

            cd "$DEPLOY_DIR"

            # ── Ensure .env exists ───────────────────────────────────────
            if [ ! -f .env ]; then
              echo "⚠️  WARNING: .env file not found!"
              echo "   Please create it manually: nano $DEPLOY_DIR/.env"
              exit 1
            fi

            # ── Detect docker compose command ────────────────────────────
            if command -v docker-compose &>/dev/null; then
              DC="docker-compose"
            else
              DC="docker compose"
            fi
            echo "🐳 Using: $DC"

            # ── Persistent data directory (hardcoded — matches docker-compose.yml volume) ──
            LS_DATA="/opt/vaidikai-data/labelstudio"
            mkdir -p "$LS_DATA" "$LS_DATA/sam_models"

            # ── One-time DB migration: if canonical DB is empty, copy from legacy path ──
            LEGACY_DB="$DEPLOY_DIR/labelstudio-data/label_studio.sqlite3"
            CANONICAL_DB="$LS_DATA/label_studio.sqlite3"
            if [ -f "$LEGACY_DB" ]; then
              # Check if canonical DB has the user table (proxy for "is initialized")
              HAS_TABLE=$(python3 -c 'import sqlite3,sys; c=sqlite3.connect(sys.argv[1]); q="SELECT count(*) FROM sqlite_master WHERE type="+chr(39)+"table"+chr(39)+" AND name="+chr(39)+"htx_user"+chr(39); r=c.execute(q).fetchone(); print("yes" if r and r[0]>0 else "no")' "$CANONICAL_DB" 2>/dev/null || echo "no")
              if [ "$HAS_TABLE" = "no" ]; then
                echo "📦 Migrating Label Studio DB from legacy path to canonical path..."
                cp "$LEGACY_DB" "$CANONICAL_DB"
                echo "✅ DB migrated: $LEGACY_DB → $CANONICAL_DB"
              else
                echo "✅ Canonical DB already initialized — no migration needed"
              fi
            fi

            echo "🛑 Stopping and rebuilding portal containers (preserving LS data)..."
            $DC stop vaidikai-portal sam-ml-backend || true
            $DC rm -f vaidikai-portal sam-ml-backend || true

            echo "🔨 Building new images..."
            $DC build --no-cache vaidikai-portal sam-ml-backend

            echo "🚀 Starting all services..."
            $DC up -d

            echo "⏳ Waiting for services to become ready..."

            # ── Helper: wait_for_service <url> <label> <max_attempts> <sleep_interval> ──
            wait_for_service() {
              local url="$1"
              local label="$2"
              local max_attempts="$3"
              local interval="$4"
              local attempt=1
              while [ $attempt -le $max_attempts ]; do
                if curl -sf "$url" > /dev/null 2>&1; then
                  echo "✅ $label is healthy (attempt $attempt/$max_attempts)"
                  return 0
                fi
                echo "  ⌛ Waiting for $label... (attempt $attempt/$max_attempts)"
                sleep $interval
                attempt=$((attempt + 1))
              done
              echo "❌ $label failed to become healthy after $((max_attempts * interval))s"
              return 1
            }

            # ── Health checks ────────────────────────────────────────────
            ERRORS=0

            # Portal: up to 60s (12 attempts × 5s)
            if ! wait_for_service "http://localhost:4005/health" "Portal (port 4005)" 12 5; then
              $DC logs --tail=40 vaidikai-portal
              ERRORS=$((ERRORS+1))
            fi

            # Label Studio: up to 3 minutes (18 attempts × 10s) — needs DB migrations on fresh boot
            if ! wait_for_service "http://localhost:4006/health" "Label Studio (port 4006)" 18 10; then
              $DC logs --tail=40 labelstudio
              ERRORS=$((ERRORS+1))
            fi

            # SAM ML Backend: up to 60s (12 attempts × 5s)
            if ! wait_for_service "http://localhost:4007/health" "SAM ML Backend (port 4007)" 12 5; then
              $DC logs --tail=40 sam-ml-backend
              ERRORS=$((ERRORS+1))
            fi

            if [ $ERRORS -gt 0 ]; then
              echo ""
              echo "⚠️  $ERRORS service(s) failed health checks"
              exit 1
            fi

            echo ""
            echo "🎉 Deployment successful!"
            echo ""
            echo "Service URLs:"
            SERVER_IP=$(curl -s ifconfig.me)
            echo "  Portal:       http://$SERVER_IP:4005"
            echo "  Label Studio: http://$SERVER_IP:4006"
            echo "  SAM ML:       http://$SERVER_IP:4007"
          EOF

      - name: Notify success
        if: success()
        run: |
          echo "✅ Deployment completed successfully!"
          echo "🌐 Portal: http://${{ secrets.VULTR_IP }}:4005"
          echo "🏷️  Label Studio: http://${{ secrets.VULTR_IP }}:4006"
          echo "🤖 SAM ML: http://${{ secrets.VULTR_IP }}:4007"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Deployment failed! Check logs above."
          exit 1
