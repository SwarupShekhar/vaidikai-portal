version: '3.8'

services:
  vaidikai-portal:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - /tmp/vaidikai:/tmp/vaidikai
    restart: always
    depends_on:
      - labelstudio

  labelstudio:
    image: heartexlabs/label-studio:latest
    ports:
      - "8080:8080"
    volumes:
      - ./labelstudio-data:/label-studio/data
    environment:
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
    restart: always
