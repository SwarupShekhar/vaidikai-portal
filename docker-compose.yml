version: '3.8'

services:
  vaidikai-portal:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - /tmp/vaidikai:/tmp/vaidikai
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: always
