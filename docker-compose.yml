services:
  vaidikai-portal:
    build: .
    ports:
      - "4005:8000"
    env_file:
      - .env
    volumes:
      - /tmp/vaidikai:/tmp/vaidikai
    restart: always
    depends_on:
      - labelstudio
    networks:
      - vaidikai-network

  labelstudio:
    image: heartexlabs/label-studio:latest
    ports:
      - "4006:8080"
    volumes:
      - ./labelstudio-data:/label-studio/data
    environment:
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_HOST=https://annotate.vaidik.ai
      - CSRF_TRUSTED_ORIGINS=https://annotate.vaidik.ai,http://annotate.vaidik.ai
    restart: always
    networks:
      - vaidikai-network

  sam-ml-backend:
    container_name: sam-ml-backend
    build:
      context: .
      dockerfile: Dockerfile.sam
    environment:
      - SAM_CHOICE=MobileSAM
      - LOG_LEVEL=DEBUG
      - WORKERS=1
      - THREADS=4
      - MODEL_DIR=/data/models
      - LABEL_STUDIO_HOST=http://labelstudio:8080
      - LABEL_STUDIO_ACCESS_TOKEN=${LABEL_STUDIO_API_KEY}
    ports:
      - "4007:9090"
    volumes:
      - ./labelstudio-data/sam_models:/data
    restart: always
    networks:
      - vaidikai-network

networks:
  vaidikai-network:
    driver: bridge
